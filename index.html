*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;width:100%;
  background:#1c1c1e;
  color:#e8e4dc;

#app{

#svg-wrap{
  width:100%;

  #svg-wrap{max-width:98vw;}
}
#pizza{width:100%;height:auto;display:block}

.result-block:first-child{border-color:#4a7aae;background:#252830}

.rb-ivs{font-size:10px;color:#555;letter-spacing:.2px}
#suggestions{width:100%;min-height:40px;padding:4px 10px;text-align:center}
#sug-label{font-size:10px;color:#666;margin-bottom:4px}
#sug-list{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}

  padding:6px 20px;cursor:pointer;border:none;background:transparent;
  color:#666;transition:all .18s;user-select:none;

body.play-mode .rb-chord{color:#7ec8f0}

<script>
// ===================== PWA INLINE =====================
// PWA setup — fully wrapped in try/catch so ANY error here
// cannot block the main app from rendering on Android Chrome
(function(){
  try{
    // Safe btoa for SVG (encode to percent-encoding first)
    const iconSvg='<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180"><rect width="180" height="180" rx="36" fill="%231c1c1e"/><circle cx="90" cy="90" r="72" fill="none" stroke="%234A90D9" stroke-width="4"/><text x="90" y="100" text-anchor="middle" dominant-baseline="central" font-size="44" font-weight="700" fill="%234A90D9">C-C</text></svg>';
    const iconUrl='data:image/svg+xml,'+iconSvg;
    const link=document.createElement('link');
    link.rel='apple-touch-icon';link.href=iconUrl;
    document.head.appendChild(link);
  }catch(e){}

  // Manifest via blob — safe try/catch
  try{
    const manifest={name:'Chord Clock',short_name:'C-C',start_url:'.',display:'standalone',background_color:'#1c1c1e',theme_color:'#1c1c1e'};
    const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const mUrl=URL.createObjectURL(mBlob);
    // Use DOMContentLoaded to ensure element exists
    const setManifest=()=>{const el=document.getElementById('manifest-link');if(el)el.href=mUrl;};
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',setManifest);}
    else{setManifest();}
  }catch(e){}

  // Service Worker — skip entirely on Android to avoid blocking
  // SW via blob URL is blocked by Android Chrome's Content-Security-Policy
  // Only register if we have a real URL (not blob/file)
  try{
    if('serviceWorker' in navigator && location.protocol==='https:' && !location.href.startsWith('blob:')){
      const swCode=`const C='cc-v3';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)).catch(()=>new Response('offline')));});`;
      const b=new Blob([swCode],{type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
    }
  }catch(e){}
})();

// ===================== KEY SIGNATURES =====================
// C major diatonic: C D E F G A B = pcs 0,2,4,5,7,9,11
const KEY_SIGS=[
  {label:'♯♭×0 - No key (Atonal)', acc:null, scale:null,              flat:false, maj:'', min:'',    badge:'Atonal'},
  {label:'♯♭×0 - C Major | A minor',  acc:0,  scale:[0,2,4,5,7,9,11],   flat:false, maj:'C',  min:'Am',  badge:'C Major | A minor'},
  {label:'♯×1 - G Major | E minor',      acc:1,  scale:[0,2,4,6,7,9,11],   flat:false, maj:'G',  min:'Em',  badge:'G Major | E minor'},
  {label:'♯×2 - D Major | B minor',      acc:2,  scale:[1,2,4,6,7,9,11],   flat:false, maj:'D',  min:'Bm',  badge:'D Major | B minor'},
  {label:'♯×3 - A Major | F♯ minor',     acc:3,  scale:[1,2,4,6,8,9,11],   flat:false, maj:'A',  min:'F♯m', badge:'A Major | F♯ minor'},

  {label:'♭×1 - F Major | D minor',      acc:-1, scale:[0,2,4,5,7,9,10],   flat:true,  maj:'F',  min:'Dm',  badge:'F Major | D minor'},
  {label:'♭×2 - B♭ Major | G minor',     acc:-2, scale:[0,2,3,5,7,9,10],   flat:true,  maj:'B♭', min:'Gm',  badge:'B♭ Major | G minor'},
  {label:'♭×3 - E♭ Major | C minor',     acc:-3, scale:[0,2,3,5,7,8,10],   flat:true,  maj:'E♭', min:'Cm',  badge:'E♭ Major | C minor'},
  {label:'♭×4 - A♭ Major | F minor',     acc:-4, scale:[0,1,3,5,7,8,10],   flat:true,  maj:'A♭', min:'Fm',  badge:'A♭ Major | F minor'},
  {label:'♭×5 - D♭ Major | B♭ minor',    acc:-5, scale:[0,1,3,5,6,8,10],   flat:true,  maj:'D♭', min:'B♭m', badge:'D♭ Major | B♭ minor'},
  {label:'♭×6 - G♭ Major | E♭ minor',    acc:-6, scale:[1,3,5,6,8,10,11],  flat:true,  maj:'G♭', min:'E♭m', badge:'G♭ Major | E♭ minor'},
];
let currentKey=KEY_SIGS[0];
const ksel=document.getElementById('key-select');
KEY_SIGS.forEach((k,i)=>{const o=document.createElement('option');o.value=i;o.textContent=k.label;ksel.appendChild(o);});
ksel.addEventListener('change',()=>{
  currentKey=KEY_SIGS[+ksel.value];
  // Blue highlight when a key is selected (index 0 = atonal = no highlight)
  ksel.classList.toggle('key-active', +ksel.value !== 0);
  renderSlices();

// ===================== NOTES =====================
const NOTES=[
  {n:0,shp:'C',  flt:'C'},  {n:1,shp:'C♯',flt:'D♭'},
  {n:2,shp:'D',  flt:'D'},  {n:3,shp:'D♯',flt:'E♭'},
  {n:4,shp:'E',  flt:'E'},  {n:5,shp:'F',  flt:'F'},
  {n:6,shp:'F♯',flt:'G♭'}, {n:7,shp:'G',  flt:'G'},
  {n:8,shp:'G♯',flt:'A♭'}, {n:9,shp:'A',  flt:'A'},
  {n:10,shp:'A♯',flt:'B♭'},{n:11,shp:'B', flt:'B'},
];
const BLACK=new Set([1,3,6,8,10]);
const SHARP_ROOTS=new Set([0,7,2,9,4,11,6]);

// Suffixes that prefer flat spelling when no key is set
const FLAT_SEVEN_SUFFIXES=new Set([
  '7','m7','dim7','m7♭5','aug7','7sus4','7♭5','7♯9',
  '9','M9','m9','6/9','7♭9','7♯11','M7♯11','m9♭5',
]);
function useFlat(root,s){
  // 1. Explicit accidental in suffix is absolute
  if(s.includes('♯'))return false;
  if(s.includes('♭'))return true;
  // 2. Key signature overrides everything else
  if(currentKey.acc!==null)return currentKey.flat;
  // 3. No key set: m7-family prefers flat spelling
  if(FLAT_SEVEN_SUFFIXES.has(s))return true;
  // 4. Root character decides
  return!SHARP_ROOTS.has(root);
}
function noteName(n,flat){
  if(!BLACK.has(n))return NOTES[n].shp;
  return flat?NOTES[n].flt:NOTES[n].shp;
}
function sliceLabel(n){
  if(!BLACK.has(n))return NOTES[n].shp;
  // null=atonal, 0=C Major: both sides shown
  if(currentKey.acc===null||currentKey.acc===0)return NOTES[n].shp+' | '+NOTES[n].flt;
  return currentKey.flat?NOTES[n].flt:NOTES[n].shp;
}
function fmtRoot(n,s,flat){
  const p=flat?NOTES[n].flt:NOTES[n].shp;
  if(!BLACK.has(n))return p+s;
  if(currentKey.acc!==null)return p+s;
  const sf=NOTES[n].shp+s;
  let ff=s;if(s.startsWith('♭'))ff='('+s+')';
  return sf+' | '+NOTES[n].flt+ff;
}

const IV_NAME={0:'Root',1:'m2',2:'M2',3:'m3',4:'M3',5:'P4',6:'dim5',7:'P5',8:'aug5',9:'M6',10:'m7',11:'M7'};
const IV_NAME_DIM7={0:'Root',3:'m3',6:'dim5',9:'bb7'};

// ===================== CHORDS =====================
const CHORDS=[
  {s:'(5)',iv:[0,7],l:'P5',pri:10},{s:'(4)',iv:[0,5],l:'P4',pri:11},
  {s:'(M3)',iv:[0,4],l:'M3',pri:12},{s:'(m3)',iv:[0,3],l:'m3',pri:13},

  {s:'',iv:[0,4,7],l:'Major',pri:1},{s:'m',iv:[0,3,7],l:'Minor',pri:2},

  {s:'♭5',iv:[0,4,6],l:'Major ♭5',pri:7},
  {s:'7',iv:[0,4,7,10],l:'Dom 7th',pri:1},{s:'M7',iv:[0,4,7,11],l:'Major 7th',pri:2},
  {s:'m7',iv:[0,3,7,10],l:'Minor 7th',pri:3},{s:'mM7',iv:[0,3,7,11],l:'Min-Maj 7th',pri:4},
  {s:'dim7',iv:[0,3,6,9],l:'Dim 7th',pri:5},{s:'m7♭5',iv:[0,3,6,10],l:'Half-dim',pri:6},
  {s:'aug7',iv:[0,4,8,10],l:'Aug 7th',pri:7},{s:'augM7',iv:[0,4,8,11],l:'Aug Maj7',pri:8},
  {s:'6',iv:[0,4,7,9],l:'Major 6th',pri:9},{s:'m6',iv:[0,3,7,9],l:'Minor 6th',pri:10},
  {s:'add9',iv:[0,2,4,7],l:'Add9',pri:11},{s:'madd9',iv:[0,2,3,7],l:'m Add9',pri:12},
  {s:'7sus4',iv:[0,5,7,10],l:'7sus4',pri:13},{s:'7♭5',iv:[0,4,6,10],l:'Dom 7♭5',pri:14},
  {s:'7♯9',iv:[0,3,4,7,10],l:'7♯9 Jimi',pri:15},
  {s:'9',iv:[0,2,4,7,10],l:'Dom 9th',pri:1},{s:'M9',iv:[0,2,4,7,11],l:'Major 9th',pri:2},
  {s:'m9',iv:[0,2,3,7,10],l:'Minor 9th',pri:3},{s:'m69',iv:[0,2,3,7,9],l:'m6/9',pri:4},{s:'69',iv:[0,2,4,7,9],l:'6/9',pri:4},
  {s:'7♭9',iv:[0,1,4,7,10],l:'Dom 7♭9',pri:5},{s:'7♯11',iv:[0,4,6,7,10],l:'7♯11',pri:7},
  {s:'M7♯11',iv:[0,4,6,7,11],l:'Maj7♯11',pri:8},{s:'m9♭5',iv:[0,2,3,6,10],l:'m9♭5',pri:9},
  {s:'add11',iv:[0,4,5,7],l:'Add11',pri:11},{s:'madd11',iv:[0,3,5,7],l:'m Add11',pri:12},

  {s:'m11',    iv:[0,3,7,10,2,5],  l:'Minor 11th', pri:4},
  {s:'M11',    iv:[0,4,7,11,2,5],  l:'Major 11th', pri:5},
  {s:'13',     iv:[0,4,7,10,2,9],  l:'Dom 13th',   pri:3},
  {s:'m13',    iv:[0,3,7,10,2,9],  l:'Minor 13th', pri:4},
  {s:'M13',    iv:[0,4,7,11,2,9],  l:'Major 13th', pri:5},
  {s:'9♯11',   iv:[0,4,7,10,2,6],  l:'9♯11',   pri:6},
  {s:'M9♯11',  iv:[0,4,7,11,2,6],  l:'Maj9♯11', pri:7},
  {s:'7♭9♯11',iv:[0,4,7,10,1,6],l:'7♭9♯11', pri:8},
  {s:'7♯9♯11',iv:[0,4,7,10,3,6],l:'7♯9♯11', pri:9},
  {s:'13♭9',  iv:[0,4,7,10,1,9],  l:'13♭9',   pri:10},
  {s:'13♯9',  iv:[0,4,7,10,3,9],  l:'13♯9',   pri:11},
  {s:'13♯11', iv:[0,4,7,10,6,9],  l:'13♯11',  pri:12},
  {s:'m7add11',iv:[0,3,7,10,5],    l:'m7 add11',   pri:13},
  {s:'7add13', iv:[0,4,7,10,9],    l:'7 add13',    pri:13},
  {s:'m9add11',iv:[0,3,7,10,2,5],  l:'m9 add11',   pri:14},
];
const SDB={};
CHORDS.forEach(ch=>{
  if(ch.iv.length<3)return;
  const iv=[...ch.iv].sort((a,b)=>a-b);
  for(let skip=0;skip<iv.length;skip++){
    const sub=iv.filter((_,i)=>i!==skip);
    const key=sub.join(',');
    if(!SDB[key])SDB[key]=[];
    SDB[key].push({s:ch.s,l:ch.l,pri:ch.pri});
  }
});

// ===================== AUDIO =====================
// Architecture: each osc → voiceGain(fixed, attack only)
//               all voiceGains → mixGain(handles decay/release)
//               mixGain → limiter(fixed gain) → destination
// This means only ONE node controls time-varying gain,
// eliminating the beating/wavering caused by multiple simultaneous GainNode ramps.

let actx=null;
let mixGain=null;   // shared gain node — only this does time-varying ramps
let limiter=null;   // fixed output gain, no time variation
const activeNodes=new Map(); // n -> {osc, vGain}

function getAC(){
  if(!actx){
    actx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    mixGain=actx.createGain();
    mixGain.gain.value=1.0;
    limiter=actx.createGain();
    limiter.gain.value=0.70; // fixed output level — never changes
    mixGain.connect(limiter);
    limiter.connect(actx.destination);
  }
  if(actx.state==='suspended')actx.resume().catch(()=>{});
  return actx;
}

// Per-voice level: fixed constant, no time variation
// Scale by voice count so chords don't clip
function voiceLevel(nVoices){ return Math.min(0.28, 0.28/Math.sqrt(Math.max(1,nVoices))); }

function stopNote(n,imm){
  if(!activeNodes.has(n))return;
  const{osc,vGain}=activeNodes.get(n);
  activeNodes.delete(n);
  const t=actx.currentTime;
  // Fade the individual voice gain to silence (prevents click on note removal)
  vGain.gain.cancelScheduledValues(t);
  vGain.gain.setValueAtTime(vGain.gain.value,t);
  const fade=imm?0.015:0.08; // very short: click prevention only
  vGain.gain.linearRampToValueAtTime(0.0001,t+fade);
  try{osc.stop(t+fade+0.01);}catch(e){}
}
function stopAll(imm){[...activeNodes.keys()].forEach(n=>stopNote(n,imm));}

// Schedule mixGain decay — called once per playSelected/playModePress
// All voices are affected equally → no relative amplitude variation → no beating
function scheduleMixDecay(holdMode){
  const t=actx.currentTime+0.05;
  mixGain.gain.cancelScheduledValues(t);
  mixGain.gain.setValueAtTime(1.0,t);
  if(holdMode){
    // Play mode: natural piano-like decay while held
    mixGain.gain.linearRampToValueAtTime(0.72,t+0.4);
    mixGain.gain.linearRampToValueAtTime(0.52,t+1.5);
    // Release handled by scheduleMixRelease() on pointer/key up
  } else {
    // Analyze mode: single smooth decay to silence
    mixGain.gain.linearRampToValueAtTime(1.0,t+0.01); // hold briefly
    mixGain.gain.linearRampToValueAtTime(0.0001,t+3.5);
  }
}

function scheduleMixRelease(){
  // Called when all play-mode notes are released
  const t=actx.currentTime;
  const cur=mixGain.gain.value;
  mixGain.gain.cancelScheduledValues(t);
  mixGain.gain.setValueAtTime(Math.max(cur,0.0001),t);
  mixGain.gain.linearRampToValueAtTime(0.0001,t+0.15); // 150ms release
}

function _playOsc(n,semitone,nVoices){
  const ac=getAC();
  const freq=442*Math.pow(2,(semitone-9)/12);
  const level=voiceLevel(nVoices);
  const t=ac.currentTime+0.05;

  const osc=ac.createOscillator();
  const vGain=ac.createGain();
  osc.type='sine';
  osc.frequency.value=freq;

  // voiceGain: attack only, then FIXED value — no ongoing ramp
  vGain.gain.setValueAtTime(0.0001,t);
  vGain.gain.linearRampToValueAtTime(level,t+0.010); // 10ms attack
  vGain.gain.setValueAtTime(level,t+0.010);          // hold fixed forever

  osc.connect(vGain);
  vGain.connect(mixGain); // all voices feed into single mixGain
  osc.start(t);
  osc.stop(t+30); // safety; stopped by stopNote() in practice

  activeNodes.set(n,{osc,vGain});
}

function playSelected(){
  const sel=Array.from(selected).sort((a,b)=>a-b);
  if(!sel.length)return;
  const hits=detect(sel);
  const root=hits.length>0?hits[0].root:sel[0];
  stopAll(true);
  scheduleMixDecay(false); // Analyze mode decay
  sel.forEach(n=>_playOsc(n,n+(n<root?12:0),sel.length));
}

// ===================== DETECTION =====================
function detect(sel){
  if(sel.length<2)return[];
  const res=[];const seen=new Set();
  for(let root=0;root<12;root++){
    const ivs=sel.map(n=>((n-root)+12)%12).sort((a,b)=>a-b);
    for(const ch of CHORDS){
      const ci=[...ch.iv].map(x=>((x%12)+12)%12).sort((a,b)=>a-b);
      if(ci.length!==ivs.length||!ci.every((v,i)=>v===ivs[i]))continue;
      const key=root+'_'+ch.s;if(seen.has(key))continue;seen.add(key);
      res.push({root,s:ch.s,l:ch.l,pri:ch.pri||99});
    }
  }
  // Sort: primary = chord priority, secondary = prefer key tonic as root
  const keyRoot=currentKey.scale&&currentKey.scale.length>0
    ?currentKey.scale.reduce((a,b)=>a<b?a:b,-1):-1; // tonic = lowest pc in scale (approx)
  // Better: use maj root from key name
  const tonicMap={C:0,G:7,D:2,A:9,E:4,B:11,'F♯':6,F:5,'B♭':10,'E♭':3,'A♭':8,'D♭':1,'G♭':6};
  const tonic=currentKey.maj?tonicMap[currentKey.maj]??-1:-1;
  return res.sort((a,b)=>{
    if(a.pri!==b.pri)return a.pri-b.pri;
    const aT=(tonic>=0&&a.root===tonic)?0:1;
    const bT=(tonic>=0&&b.root===tonic)?0:1;
    return aT-bT;
  });
}
function getSugs(sel){
  const res=[];const seen=new Set();
  for(let root=0;root<12;root++){
    const ivs=sel.map(n=>((n-root)+12)%12).sort((a,b)=>a-b);
    const key=ivs.join(',');const cands=SDB[key];if(!cands)continue;
    cands.forEach(c=>{const k=root+'_'+c.s;if(seen.has(k))return;seen.add(k);res.push({root,s:c.s,l:c.l,pri:c.pri});});
  }
  return res.sort((a,b)=>a.pri-b.pri).slice(0,12);
}
function buildNoteIvStr(selArr,root,flat,suffix){
  const ordered=[root,...selArr.filter(n=>n!==root).sort((a,b)=>((a-root+12)%12)-((b-root+12)%12))];
  const ivMap=(suffix==='dim7')?IV_NAME_DIM7:IV_NAME;
  return{
    names:ordered.map(n=>noteName(n,flat)).join(' + '),
    ivs:ordered.map(n=>{const iv=((n-root)+12)%12;return ivMap[iv]||IV_NAME[iv]||'iv'+iv;}).join(' + ')
  };
}

// ===================== SVG =====================
const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('pizza');
const cx=340,cy=340,RO=300,RI=108;
const selected=new Set();let sugHL=new Set();

function polar(a,r){return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function mkT(x,y,txt,sz,fill,anchor,weight){
  const t=document.createElementNS(NS,'text');
  t.setAttribute('x',x);t.setAttribute('y',y);
  t.setAttribute('text-anchor',anchor||'middle');
  t.setAttribute('dominant-baseline','central');
  t.setAttribute('font-size',sz);t.setAttribute('fill',fill);
  if(weight)t.setAttribute('font-weight',weight);
  // Render " | " separator with thin weight for enharmonic display
  if(txt.includes(' | ')){
    const parts=txt.split(' | ');
    parts.forEach((part,i)=>{
      const ts=document.createElementNS(NS,'tspan');
      ts.textContent=part;
      if(weight)ts.setAttribute('font-weight',weight);
      t.appendChild(ts);
      if(i<parts.length-1){
        const sep=document.createElementNS(NS,'tspan');
        sep.textContent=' | ';
        sep.setAttribute('font-weight','300');
        sep.setAttribute('fill',fill==='var(--color-text-primary)'||fill==='#e8e4dc'?'#666':fill);
        t.appendChild(sep);
      }
    });
  } else {
    t.textContent=txt;
  }
  return t;
}

function renderSlices(){
  svg.querySelectorAll('.sg').forEach(e=>e.remove());
  const scaleSet=currentKey.scale?new Set(currentKey.scale):null;
  NOTES.forEach(note=>{
    const i=note.n;
    const isSel=selected.has(i);
    const isSug=sugHL.has(i)&&!isSel;
    const inScale=scaleSet?scaleSet.has(i):false;
    const ang=(i/12)*2*Math.PI-Math.PI/2;
    const midR=(RO+RI)/2;
    const[lx,ly]=polar(ang,midR);
    const g=document.createElementNS(NS,'g');
    g.setAttribute('class','sg');g.style.cursor='pointer';
    g.setAttribute('data-n',i);
    // Analyze mode: click toggle
    g.addEventListener('click',e=>{if(currentMode==='analyze')toggleNote(i);});
    // Play mode: pointer events (mouse + touch unified)
    g.addEventListener('pointerdown',e=>{
      if(currentMode!=='play')return;
      e.preventDefault();
      g.setPointerCapture(e.pointerId);
      playModePress(i);
    });
    g.addEventListener('pointerup',e=>{
      if(currentMode!=='play')return;
      playModeRelease(i);
    });
    g.addEventListener('pointercancel',e=>{
      if(currentMode!=='play')return;
      playModeRelease(i);
    });
    // Touch: sliding finger onto a new slice
    g.addEventListener('pointerenter',e=>{
      if(currentMode!=='play')return;
      if(e.buttons>0||e.pointerType==='touch') playModePress(i);
    });
    g.addEventListener('pointerleave',e=>{
      if(currentMode!=='play')return;
      if(e.pointerType==='touch') playModeRelease(i);
    });

    const sa=2*Math.PI/12,gap=0.018;
    const a1=ang-sa/2+gap,a2=ang+sa/2-gap;
    const[ox1,oy1]=polar(a1,RO);const[ox2,oy2]=polar(a2,RO);
    const[ix1,iy1]=polar(a2,RI);const[ix2,iy2]=polar(a1,RI);
    const d=`M${ox1} ${oy1}A${RO} ${RO} 0 0 1 ${ox2} ${oy2}L${ix1} ${iy1}A${RI} ${RI} 0 0 0 ${ix2} ${iy2}Z`;

    const path=document.createElementNS(NS,'path');
    path.setAttribute('d',d);
    // selected: blue fill. unselected: original white/black key colors
    const isHeld=playActive.has(i);
    let fill,stroke,sw;
    if(isSel&&isHeld){
      fill='#74b8f0';stroke='#74b8f0';sw='1'; // play mode: brighter while held
    } else if(isSel){
      fill='#4A90D9';stroke='#4A90D9';sw='1';
    } else if(BLACK.has(i)){
      fill='#2a2826';stroke='#444';sw='1';
    } else {
      fill='#f0ece4';stroke='#bbb';sw='1';
    }
    path.setAttribute('fill',fill);
    path.setAttribute('stroke',stroke);
    path.setAttribute('stroke-width',sw);
    g.appendChild(path);

    // Scale highlight ring (gold, outer edge only)
    if(inScale&&!isSel){
      const ro2=RO-1,ri2=RO-9;
      const[sx1,sy1]=polar(a1,ro2);const[sx2,sy2]=polar(a2,ro2);
      const[si1,siy1]=polar(a2,ri2);const[si2,siy2]=polar(a1,ri2);
      const ring=document.createElementNS(NS,'path');
      ring.setAttribute('d',`M${sx1} ${sy1}A${ro2} ${ro2} 0 0 1 ${sx2} ${sy2}L${si1} ${siy1}A${ri2} ${ri2} 0 0 0 ${si2} ${siy2}Z`);
      ring.setAttribute('fill','#c8a84b');ring.setAttribute('opacity','0.7');
      g.appendChild(ring);
    }
    // Suggest ring (blue, slightly inside scale ring if both)
    if(isSug){
      const off=inScale?10:1;
      const ro2=RO-off,ri2=RO-off-9;
      const[sx1,sy1]=polar(a1,ro2);const[sx2,sy2]=polar(a2,ro2);
      const[si1,siy1]=polar(a2,ri2);const[si2,siy2]=polar(a1,ri2);
      const ring=document.createElementNS(NS,'path');
      ring.setAttribute('d',`M${sx1} ${sy1}A${ro2} ${ro2} 0 0 1 ${sx2} ${sy2}L${si1} ${siy1}A${ri2} ${ri2} 0 0 0 ${si2} ${siy2}Z`);
      ring.setAttribute('fill','#4A90D9');ring.setAttribute('opacity','0.5');
      g.appendChild(ring);
    }

    const nameC=isSel?'#fff':BLACK.has(i)?'#ddd':'#1a1a1a';
    const fs=BLACK.has(i)?'12':'20';
    g.appendChild(mkT(lx,ly,sliceLabel(i),fs,nameC,'middle','700'));
    svg.appendChild(g);
  });
}

function renderCenter(){
  svg.querySelectorAll('.cg').forEach(e=>e.remove());
  const g=document.createElementNS(NS,'g');
  g.setAttribute('class','cg');g.style.cursor='pointer';
  g.addEventListener('click',resetAll);

  // Fixed light-gray background for readability in any mode
  const circ=document.createElementNS(NS,'circle');
  circ.setAttribute('cx',cx);circ.setAttribute('cy',cy);circ.setAttribute('r',RI-2);
  circ.setAttribute('fill','#3a3a3e');
  circ.setAttribute('stroke','#555');circ.setAttribute('stroke-width','1');
  g.appendChild(circ);

  const TEXT_COL='#e8e4dc';
  const TEXT_SUB='#aaa';
  const TEXT_OR='#666';

  const sel=Array.from(selected).sort((a,b)=>a-b);
  if(sel.length===0){
    g.appendChild(mkT(cx,cy,'tap to play','11',TEXT_OR));
    svg.appendChild(g);return;
  }
  if(sel.length===1){
    g.appendChild(mkT(cx,cy,'1 note','14',TEXT_SUB));
    svg.appendChild(g);return;
  }
  if(sel.length===2){
    g.appendChild(mkT(cx,cy,'2 notes','13',TEXT_SUB));
    svg.appendChild(g);return;
  }
  const hits=detect(sel);
  if(hits.length===0){
    g.appendChild(mkT(cx,cy,'?','26',TEXT_SUB));
    svg.appendChild(g);return;
  }
  const show=hits.slice(0,2);const GAP=22;
  if(show.length===1){
    const h=show[0];const flat=useFlat(h.root,h.s);const full=fmtRoot(h.root,h.s,flat);
    if(full.includes(' | ')){
      const[top,bot]=full.split(' | ');const ml=Math.max(top.length,bot.length);
      const fs=ml>10?'13':ml>7?'16':ml>5?'20':'26';
      g.appendChild(mkT(cx,cy-GAP,top,fs,TEXT_COL,'middle','700'));
      g.appendChild(mkT(cx,cy,'or','9',TEXT_OR,'middle','400'));
      g.appendChild(mkT(cx,cy+GAP,bot,fs,TEXT_SUB,'middle','500'));
    } else {
      const fs=full.length>10?'14':full.length>7?'20':full.length>4?'26':'32';
      g.appendChild(mkT(cx,cy,full,fs,TEXT_COL,'middle','700'));
    }
  } else {
    const[h1,h2]=show;
    const f1=useFlat(h1.root,h1.s),f2=useFlat(h2.root,h2.s);
    const n1=fmtRoot(h1.root,h1.s,f1);const n2=fmtRoot(h2.root,h2.s,f2);
    const ml=Math.max(n1.replace(' | ','|').length,n2.replace(' | ','|').length);
    const fs=ml>12?'11':ml>9?'13':ml>6?'16':'21';
    g.appendChild(mkT(cx,cy-GAP,n1,fs,TEXT_COL,'middle','700'));
    g.appendChild(mkT(cx,cy,'or','9',TEXT_OR,'middle','400'));
    g.appendChild(mkT(cx,cy+GAP,n2,fs,TEXT_SUB,'middle','500'));
  }
  svg.appendChild(g);
}

// ===================== RESULTS =====================
function updateResults(){
  const sel=Array.from(selected).sort((a,b)=>a-b);
  const area=document.getElementById('results-area');
  const slEl=document.getElementById('sug-label');
  const slistEl=document.getElementById('sug-list');
  area.innerHTML='';sugHL.clear();
  if(sel.length===0){slEl.textContent='';slistEl.innerHTML='';return;}
  const hits=detect(sel);
  if(sel.length===1){
    const flat=currentKey.flat;const nm=noteName(sel[0],flat);
    area.innerHTML=`<div class="result-block"><div class="rb-chord">${nm}</div><div class="rb-notes">${nm}</div><div class="rb-ivs">Root</div></div>`;
    slEl.textContent='';slistEl.innerHTML='';return;
  }
  if(sel.length>=3&&hits.length>0){
    hits.slice(0,3).forEach(h=>{
      const flat=useFlat(h.root,h.s);
      const chName=fmtRoot(h.root,h.s,flat);
      const{names,ivs}=buildNoteIvStr(sel,h.root,flat,h.s);
      const div=document.createElement('div');div.className='result-block';
      const chDisp=chName.replace(/ \| /g,'<span style="font-weight:300;color:#555"> | </span>');
      div.innerHTML=`<div class="rb-chord">${chDisp}</div><div class="rb-notes">${names}</div><div class="rb-ivs">${ivs}</div>`;
      area.appendChild(div);
    });
    slEl.textContent='';slistEl.innerHTML='';
  } else {
    let sugsFor=null;
    if(sel.length===2){sugsFor=getSugs(sel);slEl.textContent=sugsFor.length?'Add one more note…':'';}
    else if(sel.length>=3&&hits.length===0){sugsFor=getSugs(sel);slEl.textContent=sugsFor.length?'Add one more note…':'Unidentified';}
    else{slEl.textContent='';}
    if(sugsFor&&sugsFor.length>0){
      slistEl.innerHTML=sugsFor.map(s=>{const flat=useFlat(s.root,s.s);const rn=fmtRoot(s.root,s.s,flat).replace(' | ','<span style="font-weight:300;color:#444"> | </span>');return`<span class="sug-tag">${rn}</span>`;}).join('');
      sugsFor.forEach(s=>{
        for(let n=0;n<12;n++){
          if(selected.has(n))continue;
          if(detect([...sel,n]).some(h=>h.root===s.root&&h.s===s.s))sugHL.add(n);
        }
      });
    } else if(sugsFor){slistEl.innerHTML='';}
    else{slistEl.innerHTML='';}
  }
}

function updateAll(){updateResults();renderSlices();renderCenter();}
// ===================== MODE =====================
let currentMode='analyze';
const playActive=new Map(); // n -> true (currently held in play mode)

function setMode(mode){
  currentMode=mode;
  document.getElementById('btn-analyze').classList.toggle('active',mode==='analyze');
  document.getElementById('btn-play').classList.toggle('active',mode==='play');
  document.body.classList.toggle('play-mode',mode==='play');
  if(mode==='play'){
    // Clear analyze selections when entering play mode
    stopAll(true);selected.clear();sugHL.clear();
    // Reset mixGain to full
    if(mixGain){mixGain.gain.cancelScheduledValues(0);mixGain.gain.value=1.0;}
    updateAll();
  } else {
    // Release all play-mode held notes when returning to analyze
    playActive.forEach((_,n)=>stopNote(n,true));
    playActive.clear();
  }
}

function playModePress(n){
  if(playActive.has(n))return;
  playActive.set(n,true);
  selected.add(n);
  scheduleMixDecay(true); // reset mix envelope for play mode
  _playOsc(n,n,selected.size); // no octave shift in play mode
  updateAll();
}

function playModeRelease(n){
  if(!playActive.has(n))return;
  playActive.delete(n);
  selected.delete(n);
  stopNote(n,true); // fade out individual voice
  if(playActive.size===0){
    // Last note released: fade mixGain to silence
    scheduleMixRelease();
  }
  updateAll();
}

function toggleNote(i){
  if(selected.has(i)){selected.delete(i);stopNote(i,true);}
  else{selected.add(i);playSelected();}
  updateAll();
}
function resetAll(){
  stopAll(true);selected.clear();sugHL.clear();
  playActive.clear();
  updateAll();
}

// ===================== KEYBOARD =====================
const KEY_MAP={'Digit1':0,'Digit2':2,'Digit3':4,'Digit4':5,'Digit5':7,'Digit6':9,'Digit7':11,'Digit8':0,'F1':1,'F2':3,'F4':6,'F5':8,'F6':10};
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){e.preventDefault();resetAll();return;}

  // Arrow Left/Right: switch Analyze/Play mode
  if(e.key==='ArrowLeft'){e.preventDefault();setMode('analyze');return;}
  if(e.key==='ArrowRight'){e.preventDefault();setMode('play');return;}

  // Arrow Up/Down: move key signature up/down
  if(e.key==='ArrowUp'||e.key==='ArrowDown'){
    e.preventDefault();
    const cur=+ksel.value;
    const next=e.key==='ArrowUp'
      ? Math.max(0,cur-1)
      : Math.min(KEY_SIGS.length-1,cur+1);
    if(next!==cur){
      ksel.value=next;
      ksel.dispatchEvent(new Event('change'));
    }
    return;
  }

  if(e.code==='Space'||e.key==='F3'||e.key==='F7'){
    e.preventDefault();
    if(currentMode==='analyze'&&selected.size>0)playSelected();
    return;
  }
  const pc=KEY_MAP[e.code];
  if(pc===undefined)return;
  e.preventDefault();
  if(currentMode==='play'){
    if(!playActive.has(pc))playModePress(pc);
  } else {
    if(selected.has(pc)){selected.delete(pc);stopNote(pc,true);}
    else{selected.add(pc);playSelected();}
    updateAll();
  }
});
document.addEventListener('keyup',e=>{
  if(currentMode!=='play')return;
  const pc=KEY_MAP[e.code];
  if(pc!==undefined)playModeRelease(pc);
});

// ===================== MIDI =====================
function initMIDI(){
  if(!navigator.requestMIDIAccess)return;
  navigator.requestMIDIAccess().then(midi=>{
    function onMsg(e){
      if(!e.data||e.data.length<2)return;
      const[status,note,vel=0]=e.data;
      const cmd=status&0xf0;
      const pc=note%12;
      if(cmd===0x90&&vel>0){
        if(currentMode==='play'){
          // Play mode: press = hold note
          if(!playActive.has(pc))playModePress(pc);
        } else {
          // Analyze mode: toggle
          if(selected.has(pc)){selected.delete(pc);stopNote(pc,true);}
          else{selected.add(pc);playSelected();}
          updateAll();
        }
      } else if(cmd===0x80||(cmd===0x90&&vel===0)){
        if(currentMode==='play'){
          // Play mode: release = stop note
          playModeRelease(pc);
        }
        // Analyze mode: Note Off ignored (notes stay selected)
      }
    }
    function connect(m){m.inputs.forEach(inp=>inp.onmidimessage=onMsg);}
    connect(midi);midi.onstatechange=()=>connect(midi);
  }).catch(()=>{});
}
initMIDI();

// ===================== INIT =====================
['touchstart','pointerdown','keydown'].forEach(evt=>{
  document.addEventListener(evt,()=>{
    // Eagerly create and resume AudioContext on first interaction
    // This prevents scheduling-in-the-past delay on first note
    if(!actx) getAC();
    if(actx&&actx.state==='suspended')actx.resume().catch(()=>{});
  },{once:false,passive:true});
});

// Wrap in DOMContentLoaded for Android Chrome compatibility
function init(){
  // requestAnimationFrame ensures the DOM is fully painted before we
  // try to append SVG children — fixes Android Chrome blank pizza issue
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      try{renderSlices();}catch(e){console.error('renderSlices:',e);}
      try{renderCenter();}catch(e){console.error('renderCenter:',e);}
    });
  });
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
</script>
