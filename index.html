
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{display:flex;flex-direction:column;align-items:center;padding:6px 4px 16px;gap:4px}
#key-selector{width:100%;max-width:500px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:5px 8px;background:var(--color-background-secondary);border-radius:8px;border:1px solid var(--color-border-tertiary)}
#key-selector label{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
#key-select{font-size:12px;padding:3px 6px;border-radius:5px;border:1px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;flex:1;min-width:160px}
#key-badge{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
#svg-wrap{width:100%;max-width:500px}
#pizza{width:100%;height:auto}
#results-area{width:100%;max-width:500px;padding:2px 4px}
.result-block{margin-bottom:8px;padding:7px 10px;border-radius:7px;background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary)}
.result-block:first-child{border-color:#7aade0;background:var(--color-background-primary)}
.rb-chord{font-size:20px;font-weight:700;color:var(--color-text-primary);margin-bottom:2px}
.rb-notes{font-size:11px;color:var(--color-text-secondary)}
.rb-ivs{font-size:11px;color:var(--color-border-secondary);letter-spacing:.2px}
#suggestions{width:100%;max-width:500px;min-height:40px;padding:4px 8px;text-align:center}
#sug-label{font-size:10px;color:var(--color-text-secondary);margin-bottom:4px}
#sug-list{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.sug-tag{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:5px;padding:3px 9px;border:1px solid var(--color-border-tertiary)}
#status-bar{font-size:10px;color:var(--color-text-secondary);text-align:center;opacity:.6}
</style>
<div id="app">
  <div id="key-selector">
    <label>調号：</label>
    <select id="key-select"></select>
    <span id="key-badge">C / Am</span>
  </div>
  <div id="svg-wrap"><svg id="pizza" viewBox="0 0 680 680"></svg></div>
  <div id="results-area"></div>
  <div id="suggestions"><div id="sug-label"></div><div id="sug-list"></div></div>
  <div id="status-bar">⌨️ 1-8=C~C　F1F2F4F5F6=黒鍵　Esc・F3・F7=リセット　🎹 MIDI対応(PCブラウザのみ)</div>
</div>
<script>
const KEY_SIGS=[
  {label:'調号なし (C / Am)',   acc:0,  scale:[0,2,4,5,7,9,11],  flat:false,maj:'C',  min:'Am'},
  {label:'♯×1 (G / Em)',       acc:1,  scale:[0,2,4,6,7,9,11],  flat:false,maj:'G',  min:'Em'},
  {label:'♯×2 (D / Bm)',       acc:2,  scale:[0,2,4,6,8,9,11],  flat:false,maj:'D',  min:'Bm'},
  {label:'♯×3 (A / F♯m)',      acc:3,  scale:[0,1,2,4,6,8,9,11],flat:false,maj:'A',  min:'F♯m'},
  {label:'♯×4 (E / C♯m)',      acc:4,  scale:[0,1,2,4,6,8,10,11],flat:false,maj:'E', min:'C♯m'},
  {label:'♯×5 (B / G♯m)',      acc:5,  scale:[0,1,3,4,6,8,10,11],flat:false,maj:'B', min:'G♯m'},
  {label:'♯×6 (F♯ / D♯m)',     acc:6,  scale:[1,3,4,6,8,10,11,0],flat:false,maj:'F♯',min:'D♯m'},
  {label:'♭×1 (F / Dm)',       acc:-1, scale:[0,2,4,5,7,9,10,11],flat:true, maj:'F',  min:'Dm'},
  {label:'♭×2 (B♭ / Gm)',      acc:-2, scale:[0,2,3,5,7,9,10,11],flat:true, maj:'B♭', min:'Gm'},
  {label:'♭×3 (E♭ / Cm)',      acc:-3, scale:[0,2,3,5,7,8,10,11],flat:true, maj:'E♭', min:'Cm'},
  {label:'♭×4 (A♭ / Fm)',      acc:-4, scale:[0,1,3,5,7,8,10,11],flat:true, maj:'A♭', min:'Fm'},
  {label:'♭×5 (D♭ / B♭m)',     acc:-5, scale:[0,1,3,5,6,8,10,11],flat:true, maj:'D♭', min:'B♭m'},
  {label:'♭×6 (G♭ / E♭m)',     acc:-6, scale:[1,3,5,6,8,10,11,0],flat:true, maj:'G♭', min:'E♭m'},
];
let currentKey=KEY_SIGS[0];
const ksel=document.getElementById('key-select');
KEY_SIGS.forEach((k,i)=>{const o=document.createElement('option');o.value=i;o.textContent=k.label;ksel.appendChild(o);});
ksel.addEventListener('change',()=>{currentKey=KEY_SIGS[+ksel.value];document.getElementById('key-badge').textContent=currentKey.maj+' / '+currentKey.min;renderSlices();});

const NOTES=[
  {n:0,shp:'C',flt:'C'},{n:1,shp:'C♯',flt:'D♭'},{n:2,shp:'D',flt:'D'},
  {n:3,shp:'D♯',flt:'E♭'},{n:4,shp:'E',flt:'E'},{n:5,shp:'F',flt:'F'},
  {n:6,shp:'F♯',flt:'G♭'},{n:7,shp:'G',flt:'G'},{n:8,shp:'G♯',flt:'A♭'},
  {n:9,shp:'A',flt:'A'},{n:10,shp:'A♯',flt:'B♭'},{n:11,shp:'B',flt:'B'},
];
const BLACK=new Set([1,3,6,8,10]);
const SHARP_ROOTS=new Set([0,7,2,9,4,11,6]);
function useFlat(root,s){if(s.includes('♯'))return false;if(s.includes('♭'))return true;return currentKey.flat||!SHARP_ROOTS.has(root);}
function noteName(n,flat){if(!BLACK.has(n))return NOTES[n].shp;return flat?NOTES[n].flt:NOTES[n].shp;}
function sliceLabel(n){
  if(!BLACK.has(n))return NOTES[n].shp;
  if(currentKey.acc<0)return NOTES[n].flt;
  if(currentKey.acc>0)return NOTES[n].shp;
  return NOTES[n].shp+' | '+NOTES[n].flt;
}
function fmtRoot(n,s,flat){
  const primary=flat?NOTES[n].flt:NOTES[n].shp;
  if(!BLACK.has(n))return primary+s;
  if(currentKey.acc!==0)return primary+s;
  const shpFull=NOTES[n].shp+s;
  let fltS=s;if(s.startsWith('♭'))fltS='('+s+')';
  return shpFull+' | '+NOTES[n].flt+fltS;
}
const IV_NAME={0:'Root',1:'m2',2:'M2',3:'m3',4:'M3',5:'P4',6:'dim5',7:'P5',8:'aug5',9:'M6',10:'m7',11:'M7'};

const CHORDS=[
  {s:'(5)',iv:[0,7],l:'完全5度',pri:10},{s:'(4)',iv:[0,5],l:'完全4度',pri:11},
  {s:'(M3)',iv:[0,4],l:'長3度',pri:12},{s:'(m3)',iv:[0,3],l:'短3度',pri:13},
  {s:'(M2)',iv:[0,2],l:'長2度',pri:14},{s:'(m2)',iv:[0,1],l:'短2度',pri:15},
  {s:'(tt)',iv:[0,6],l:'三全音',pri:16},{s:'(M6)',iv:[0,9],l:'長6度',pri:17},
  {s:'(m6)',iv:[0,8],l:'短6度',pri:18},{s:'(M7)',iv:[0,11],l:'長7度',pri:19},{s:'(m7)',iv:[0,10],l:'短7度',pri:20},
  {s:'',iv:[0,4,7],l:'長三和音',pri:1},{s:'m',iv:[0,3,7],l:'短三和音',pri:2},
  {s:'aug',iv:[0,4,8],l:'増三和音',pri:3},{s:'dim',iv:[0,3,6],l:'減三和音',pri:4},
  {s:'sus2',iv:[0,2,7],l:'sus2',pri:5},{s:'sus4',iv:[0,5,7],l:'sus4',pri:6},
  {s:'♭5',iv:[0,4,6],l:'長三和音♭5',pri:7},
  {s:'7',iv:[0,4,7,10],l:'ドミナント7th',pri:1},{s:'M7',iv:[0,4,7,11],l:'メジャー7th',pri:2},
  {s:'m7',iv:[0,3,7,10],l:'マイナー7th',pri:3},{s:'mM7',iv:[0,3,7,11],l:'マイナーM7th',pri:4},
  {s:'dim7',iv:[0,3,6,9],l:'ディミニッシュ7th',pri:5},{s:'m7♭5',iv:[0,3,6,10],l:'ハーフディミニッシュ',pri:6},
  {s:'aug7',iv:[0,4,8,10],l:'オーギュメント7th',pri:7},{s:'augM7',iv:[0,4,8,11],l:'オーギュメントM7th',pri:8},
  {s:'6',iv:[0,4,7,9],l:'メジャー6th',pri:9},{s:'m6',iv:[0,3,7,9],l:'マイナー6th',pri:10},
  {s:'add9',iv:[0,2,4,7],l:'アドナインス',pri:11},{s:'madd9',iv:[0,2,3,7],l:'マイナーアドナインス',pri:12},
  {s:'7sus4',iv:[0,5,7,10],l:'7sus4',pri:13},{s:'7♭5',iv:[0,4,6,10],l:'7♭5',pri:14},
  {s:'7♯9',iv:[0,3,4,7,10],l:'7♯9（ジミヘン）',pri:15},
  {s:'9',iv:[0,2,4,7,10],l:'ドミナント9th',pri:1},{s:'M9',iv:[0,2,4,7,11],l:'メジャー9th',pri:2},
  {s:'m9',iv:[0,2,3,7,10],l:'マイナー9th',pri:3},{s:'6/9',iv:[0,2,4,7,9],l:'シックスナインス',pri:4},
  {s:'7♭9',iv:[0,1,4,7,10],l:'7♭9',pri:5},{s:'7♯11',iv:[0,4,6,7,10],l:'7♯11',pri:7},
  {s:'M7♯11',iv:[0,4,6,7,11],l:'M7♯11',pri:8},{s:'m9♭5',iv:[0,2,3,6,10],l:'m9♭5',pri:9},
  {s:'add11',iv:[0,4,5,7],l:'アドイレブン',pri:11},{s:'madd11',iv:[0,3,5,7],l:'マイナーアドイレブン',pri:12},
];
const SDB={};
CHORDS.forEach(ch=>{
  if(ch.iv.length<3)return;const iv=[...ch.iv].sort((a,b)=>a-b);
  for(let skip=0;skip<iv.length;skip++){
    const sub=iv.filter((_,i)=>i!==skip);const key=sub.join(',');
    if(!SDB[key])SDB[key]=[];SDB[key].push({s:ch.s,l:ch.l,pri:ch.pri});
  }
});

let actx=null;const activeNodes=new Map();
function getAC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function vGain(n){return Math.max(0.10,0.36/Math.sqrt(Math.max(1,n)));}
function stopNote(n,imm){
  if(!activeNodes.has(n))return;const{osc,gain,ac}=activeNodes.get(n);const t=ac.currentTime;
  gain.gain.cancelScheduledValues(t);
  if(imm){gain.gain.setValueAtTime(0.001,t);try{osc.stop(t+0.02);}catch(e){}}
  else{const v=Math.max(gain.gain.value||0.001,0.001);gain.gain.setValueAtTime(v,t);gain.gain.exponentialRampToValueAtTime(0.001,t+2.5);try{osc.stop(t+2.6);}catch(e){}}
  activeNodes.delete(n);
}
function stopAll(imm){[...activeNodes.keys()].forEach(n=>stopNote(n,imm));}
function playSelected(){
  const ac=getAC();const sel=Array.from(selected).sort((a,b)=>a-b);if(!sel.length)return;
  const hits=detect(sel);const root=hits.length>0?hits[0].root:sel[0];
  stopAll(true);
  sel.forEach(n=>{
    const freq=442*Math.pow(2,(n-9+(n<root?1:0)*12)/12);
    const osc=ac.createOscillator();const gain=ac.createGain();
    osc.type='triangle';osc.frequency.value=freq;const gv=vGain(sel.length);
    gain.gain.setValueAtTime(0.001,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(gv,ac.currentTime+0.012);
    gain.gain.exponentialRampToValueAtTime(gv*0.48,ac.currentTime+0.8);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+4.0);
    osc.connect(gain);gain.connect(ac.destination);osc.start();osc.stop(ac.currentTime+4.1);
    activeNodes.set(n,{osc,gain,ac});
  });
}

function detect(sel){
  if(sel.length<2)return[];const res=[];const seen=new Set();
  for(let root=0;root<12;root++){
    const ivs=sel.map(n=>((n-root)+12)%12).sort((a,b)=>a-b);
    for(const ch of CHORDS){
      const ci=[...ch.iv].map(x=>((x%12)+12)%12).sort((a,b)=>a-b);
      if(ci.length!==ivs.length||!ci.every((v,i)=>v===ivs[i]))continue;
      const key=root+'_'+ch.s;if(seen.has(key))continue;seen.add(key);
      res.push({root,s:ch.s,l:ch.l,pri:ch.pri||99});
    }
  }
  return res.sort((a,b)=>a.pri-b.pri);
}
function getSugs(sel){
  const res=[];const seen=new Set();
  for(let root=0;root<12;root++){
    const ivs=sel.map(n=>((n-root)+12)%12).sort((a,b)=>a-b);
    const key=ivs.join(',');const cands=SDB[key];if(!cands)continue;
    cands.forEach(c=>{const k=root+'_'+c.s;if(seen.has(k))return;seen.add(k);res.push({root,s:c.s,l:c.l,pri:c.pri});});
  }
  return res.sort((a,b)=>a.pri-b.pri).slice(0,12);
}
function buildNoteIvStr(selArr,root,flat){
  const ordered=[root,...selArr.filter(n=>n!==root).sort((a,b)=>((a-root+12)%12)-((b-root+12)%12))];
  return{
    names:ordered.map(n=>noteName(n,flat)).join(' + '),
    ivs:ordered.map(n=>{const iv=((n-root)+12)%12;return IV_NAME[iv]||'iv'+iv;}).join(' + ')
  };
}

const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('pizza');
const cx=340,cy=340,RO=300,RI=108;
const selected=new Set();let sugHL=new Set();

function polar(a,r){return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function mkT(x,y,txt,sz,fill,anchor,weight){
  const t=document.createElementNS(NS,'text');t.setAttribute('x',x);t.setAttribute('y',y);
  t.setAttribute('text-anchor',anchor||'middle');t.setAttribute('dominant-baseline','central');
  t.setAttribute('font-size',sz);t.setAttribute('fill',fill);if(weight)t.setAttribute('font-weight',weight);
  t.textContent=txt;return t;
}

function renderSlices(){
  svg.querySelectorAll('.sg').forEach(e=>e.remove());
  const scaleSet=new Set(currentKey.scale);
  NOTES.forEach(note=>{
    const i=note.n;const isSel=selected.has(i);const isSug=sugHL.has(i)&&!isSel;const inScale=scaleSet.has(i);
    const ang=(i/12)*2*Math.PI-Math.PI/2;const midR=(RO+RI)/2;const[lx,ly]=polar(ang,midR);
    const g=document.createElementNS(NS,'g');g.setAttribute('class','sg');g.style.cursor='pointer';
    g.addEventListener('click',()=>toggleNote(i));
    const sa=2*Math.PI/12,gap=0.018;const a1=ang-sa/2+gap,a2=ang+sa/2-gap;
    const[ox1,oy1]=polar(a1,RO);const[ox2,oy2]=polar(a2,RO);
    const[ix1,iy1]=polar(a2,RI);const[ix2,iy2]=polar(a1,RI);
    const d=`M${ox1} ${oy1}A${RO} ${RO} 0 0 1 ${ox2} ${oy2}L${ix1} ${iy1}A${RI} ${RI} 0 0 0 ${ix2} ${iy2}Z`;
    const path=document.createElementNS(NS,'path');path.setAttribute('d',d);
    let fill,stroke;
    if(isSel){fill='#4A90D9';stroke='#1A5FAD';}
    else if(BLACK.has(i)){fill=inScale?'#3d3a30':'#2a2826';stroke=inScale?'#5a5040':'#111';}
    else{fill=inScale?'#f4f1eb':'#ddd8ce';stroke=inScale?'#bbb':'#aaa';}
    path.setAttribute('fill',fill);path.setAttribute('stroke',stroke);path.setAttribute('stroke-width',isSel?'2.5':'1');g.appendChild(path);
    if(inScale&&!isSel){
      const ro2=RO-1,ri2=RO-9;
      const[sx1,sy1]=polar(a1,ro2);const[sx2,sy2]=polar(a2,ro2);
      const[si1,siy1]=polar(a2,ri2);const[si2,siy2]=polar(a1,ri2);
      const ring=document.createElementNS(NS,'path');
      ring.setAttribute('d',`M${sx1} ${sy1}A${ro2} ${ro2} 0 0 1 ${sx2} ${sy2}L${si1} ${siy1}A${ri2} ${ri2} 0 0 0 ${si2} ${siy2}Z`);
      ring.setAttribute('fill','#c8a84b');ring.setAttribute('opacity','0.55');g.appendChild(ring);
    }
    if(isSug){
      const ro2=inScale?RO-10:RO-1,ri2=inScale?RO-18:RO-10;
      const[sx1,sy1]=polar(a1,ro2);const[sx2,sy2]=polar(a2,ro2);
      const[si1,siy1]=polar(a2,ri2);const[si2,siy2]=polar(a1,ri2);
      const ring=document.createElementNS(NS,'path');
      ring.setAttribute('d',`M${sx1} ${sy1}A${ro2} ${ro2} 0 0 1 ${sx2} ${sy2}L${si1} ${siy1}A${ri2} ${ri2} 0 0 0 ${si2} ${siy2}Z`);
      ring.setAttribute('fill','#4A90D9');ring.setAttribute('opacity','0.45');g.appendChild(ring);
    }
    const nameC=isSel?'#fff':BLACK.has(i)?'#ddd':'#1a1a1a';
    g.appendChild(mkT(lx,ly,sliceLabel(i),BLACK.has(i)?'12':'20',nameC,'middle','700'));
    svg.appendChild(g);
  });
}

function renderCenter(){
  svg.querySelectorAll('.cg').forEach(e=>e.remove());
  const g=document.createElementNS(NS,'g');g.setAttribute('class','cg');g.style.cursor='pointer';
  g.addEventListener('click',resetAll);
  const circ=document.createElementNS(NS,'circle');
  circ.setAttribute('cx',cx);circ.setAttribute('cy',cy);circ.setAttribute('r',RI-2);
  circ.setAttribute('fill','var(--color-background-primary)');circ.setAttribute('stroke','var(--color-border-secondary)');circ.setAttribute('stroke-width','1');
  g.appendChild(circ);
  const sel=Array.from(selected).sort((a,b)=>a-b);
  if(sel.length===0){g.appendChild(mkT(cx,cy-7,'タップ','11','var(--color-text-secondary)'));g.appendChild(mkT(cx,cy+7,'して選択','11','var(--color-text-secondary)'));svg.appendChild(g);return;}
  if(sel.length<=2){g.appendChild(mkT(cx,cy,sel.length+'音選択中','11','var(--color-text-secondary)'));svg.appendChild(g);return;}
  const hits=detect(sel);
  if(hits.length===0){g.appendChild(mkT(cx,cy,'?','24','var(--color-text-secondary)'));svg.appendChild(g);return;}
  const show=hits.slice(0,2);const GAP=22;
  if(show.length===1){
    const h=show[0];const flat=useFlat(h.root,h.s);const full=fmtRoot(h.root,h.s,flat);
    if(full.includes(' | ')){
      const[top,bot]=full.split(' | ');const ml=Math.max(top.length,bot.length);
      const fs=ml>10?'13':ml>7?'16':ml>5?'20':'26';
      g.appendChild(mkT(cx,cy-GAP,top,fs,'var(--color-text-primary)','middle','700'));
      g.appendChild(mkT(cx,cy,'or','9','var(--color-border-secondary)','middle','400'));
      g.appendChild(mkT(cx,cy+GAP,bot,fs,'var(--color-text-secondary)','middle','500'));
    } else {
      const fs=full.length>10?'14':full.length>7?'20':full.length>4?'26':'32';
      g.appendChild(mkT(cx,cy,full,fs,'var(--color-text-primary)','middle','700'));
    }
  } else {
    const[h1,h2]=show;const f1=useFlat(h1.root,h1.s),f2=useFlat(h2.root,h2.s);
    const n1=fmtRoot(h1.root,h1.s,f1);const n2=fmtRoot(h2.root,h2.s,f2);
    const ml=Math.max(n1.replace(' | ','|').length,n2.replace(' | ','|').length);
    const fs=ml>12?'11':ml>9?'13':ml>6?'16':'21';
    g.appendChild(mkT(cx,cy-GAP,n1,fs,'var(--color-text-primary)','middle','700'));
    g.appendChild(mkT(cx,cy,'or','9','var(--color-border-secondary)','middle','400'));
    g.appendChild(mkT(cx,cy+GAP,n2,fs,'var(--color-text-secondary)','middle','500'));
  }
  svg.appendChild(g);
}

function updateResults(){
  const sel=Array.from(selected).sort((a,b)=>a-b);
  const area=document.getElementById('results-area');
  const slEl=document.getElementById('sug-label');const slistEl=document.getElementById('sug-list');
  area.innerHTML='';sugHL.clear();
  if(sel.length===0){slEl.textContent='';slistEl.innerHTML='';return;}
  const hits=detect(sel);
  if(sel.length===1){
    const flat=currentKey.flat;const nm=noteName(sel[0],flat);
    area.innerHTML=`<div class="result-block"><div class="rb-chord">${nm}</div><div class="rb-notes">${nm}</div><div class="rb-ivs">Root</div></div>`;
    slEl.textContent='';slistEl.innerHTML='';return;
  }
  if(sel.length>=3&&hits.length>0){
    hits.slice(0,3).forEach(h=>{
      const flat=useFlat(h.root,h.s);const chName=fmtRoot(h.root,h.s,flat);
      const{names,ivs}=buildNoteIvStr(sel,h.root,flat);
      const div=document.createElement('div');div.className='result-block';
      div.innerHTML=`<div class="rb-chord">${chName}</div><div class="rb-notes">${names}</div><div class="rb-ivs">${ivs}</div>`;
      area.appendChild(div);
    });
    slEl.textContent='';slistEl.innerHTML='';
  } else {
    let sugsFor=null;
    if(sel.length===2){sugsFor=getSugs(sel);slEl.textContent=sugsFor.length?'もう1音加えると…':'';}
    else if(sel.length>=3&&hits.length===0){sugsFor=getSugs(sel);slEl.textContent=sugsFor.length?'もう1音加えると…':'判別不能';}
    else{slEl.textContent='';}
    if(sugsFor&&sugsFor.length>0){
      slistEl.innerHTML=sugsFor.map(s=>{const flat=useFlat(s.root,s.s);return`<span class="sug-tag">${fmtRoot(s.root,s.s,flat)}</span>`;}).join('');
      sugsFor.forEach(s=>{
        for(let n=0;n<12;n++){if(selected.has(n))continue;if(detect([...sel,n]).some(h=>h.root===s.root&&h.s===s.s))sugHL.add(n);}
      });
    } else if(sugsFor){slistEl.innerHTML='';}else{slistEl.innerHTML='';}
  }
}

function updateAll(){updateResults();renderSlices();renderCenter();}
function toggleNote(i){
  if(selected.has(i)){selected.delete(i);stopNote(i,true);}
  else{selected.add(i);playSelected();}
  updateAll();
}
function resetAll(){stopAll(true);selected.clear();sugHL.clear();updateAll();}

const KEY_MAP={'Digit1':0,'Digit2':2,'Digit3':4,'Digit4':5,'Digit5':7,'Digit6':9,'Digit7':11,'Digit8':0,'F1':1,'F2':3,'F4':6,'F5':8,'F6':10};
const RESET_KEYS=new Set(['Escape','F3','F7']);
document.addEventListener('keydown',e=>{
  if(RESET_KEYS.has(e.key)){e.preventDefault();resetAll();return;}
  const pc=KEY_MAP[e.code];
  if(pc!==undefined){e.preventDefault();if(selected.has(pc)){selected.delete(pc);stopNote(pc,true);}else{selected.add(pc);playSelected();}updateAll();}
});
if(navigator.requestMIDIAccess){
  navigator.requestMIDIAccess().then(midi=>{
    document.getElementById('status-bar').textContent='🎹 MIDI接続済み　⌨️ 1-8=C~C　F1F2F4F5F6=黒鍵　Esc・F3・F7=リセット';
    function onMsg(e){const[status,note,vel]=e.data;const cmd=status&0xf0;const pc=note%12;if(cmd===0x90&&vel>0){if(!selected.has(pc)){selected.add(pc);playSelected();updateAll();}}}
    function connect(m){m.inputs.forEach(i=>i.onmidimessage=onMsg);}
    connect(midi);midi.onstatechange=()=>connect(midi);
  }).catch(()=>{});
}
renderSlices();renderCenter();
</script>
